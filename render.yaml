services:
  - type: web
    name: company-research-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: ACCESS_PASSWORD
        sync: false
      - key: GOOGLE_CSE_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
